{% assign section = include.section %}
{% assign items = include.items %}

{% if items.size > 0 %}
<div class="{{ section.column_class | default: 'col-12 mb-4' }}">
    <div class="card border-0 shadow-sm bg-white h-100 activity-panel">
        <div class="card-body p-4">
            <div class="d-flex align-items-center mb-4">
                <div class="activity-section-icon mr-3"><i class="fas fa-{{ section.icon | default: 'star' }}"></i></div>
                <div>
                    <h2 class="h4 mb-1">{{ section.title }}</h2>
                    {% if section.description %}
                    <div class="activity-meta">{{ section.description }}</div>
                    {% endif %}
                </div>
            </div>

            {% for item in items %}
                {% include widgets/activity_item.html item=item %}
            {% endfor %}
        </div>
    </div>
</div>
{% endif %}
